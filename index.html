<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f766e">
  <title>مدرّب القواعد والنطق — IELTS</title>
  <link rel="manifest" href="manifest.webmanifest">
  <!-- iOS / iPadOS home-screen support -->
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="IELTS 7.0">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app"></div>

  <!-- Data banks: editable JSON wrapped in one line of JS so the app opens by
       double-click with no server. Edit the arrays to add items. -->
  <script src="data/grammar.js"></script>
  <script src="data/vocab.js"></script>
  <script src="data/phonetics.js"></script>
  <script src="data/pron_dict.js"></script>
  <script src="data/collocations.js"></script>

  <!-- Engine -->
  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/drills.js"></script>
  <script src="js/session.js"></script>
  <script src="js/diagrams.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/prompts.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Offline cache (PWA). Service workers need http(s) — skipped on file://.
    if ("serviceWorker" in navigator && location.protocol.indexOf("http") === 0) {
      navigator.serviceWorker.register("sw.js").catch(function () {});
    }
  </script>

</html>
